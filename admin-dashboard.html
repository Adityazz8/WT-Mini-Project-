<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Veluxe Motors</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin: 30px auto;
            max-width: 1200px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 20px;
        }

        .admin-header h1 {
            color: #d4af37;
            margin: 0;
            font-size: 28px;
        }

        .admin-info {
            text-align: right;
            font-size: 14px;
            color: #666;
        }

        .admin-info p {
            margin: 5px 0;
        }

        .logout-btn {
            background: #d4af37;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #b8962e;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .users-section h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .user-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            background: #f9f9f9;
            transition: 0.3s;
        }

        .user-card:hover {
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
            transform: translateY(-5px);
        }

        .user-card-header {
            border-bottom: 2px solid #d4af37;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .user-card h3 {
            color: #222;
            margin: 0 0 5px 0;
            font-size: 18px;
        }

        .user-card-email {
            color: #d4af37;
            font-weight: 600;
            font-size: 13px;
        }

        .user-details {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .user-details strong {
            color: #222;
        }

        .booking-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .booking-section h4 {
            color: #d4af37;
            font-size: 13px;
            margin: 0 0 10px 0;
        }

        .booking-list {
            font-size: 12px;
            color: #555;
        }

        .booking-item {
            background: white;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #d4af37;
            padding-left: 12px;
        }

        .no-bookings {
            color: #999;
            font-style: italic;
            font-size: 12px;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <!-- Admin Header -->
    <div class="admin-header">
        <div>
            <h1>🔐 Admin Dashboard</h1>
        </div>
        <div class="admin-info">
            <p><strong>Role:</strong> Administrator</p>
            <p id="adminEmail"></p>
            <p id="loginTime"></p>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Statistics -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total Users</div>
            <div class="stat-number" id="totalUsers">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Bookings</div>
            <div class="stat-number" id="totalBookings">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Car Bookings</div>
            <div class="stat-number" id="carBookings">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Bike Bookings</div>
            <div class="stat-number" id="bikeBookings">0</div>
        </div>
    </div>

    <!-- Search Box -->
    <div class="search-box">
        <input type="text" id="searchBox" placeholder="Search users by name or email..." onkeyup="searchUsers()">
    </div>

    <!-- Users Section -->
    <div class="users-section">
        <h2>📋 Registered Users</h2>
        <div class="users-grid" id="usersGrid">
            <!-- Users will be loaded here -->
        </div>
    </div>
</div>

<script>
    function checkAdminAccess() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'admin') {
            alert('Access Denied! Admin access required.');
            window.location.href = 'index.html';
            return false;
        }
        return true;
    }

    function loadAdminDashboard() {
        if (!checkAdminAccess()) return;

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        document.getElementById('adminEmail').textContent = 'Email: ' + currentUser.email;
        document.getElementById('loginTime').textContent = 'Logged in: ' + currentUser.loginTime;

        loadUsers();
        calculateStats();
    }

    function loadUsers() {
        const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        const usersGrid = document.getElementById('usersGrid');
        usersGrid.innerHTML = '';

        if (users.length === 0) {
            usersGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No users registered yet</p>';
            return;
        }

        users.forEach(user => {
            const userCard = createUserCard(user);
            usersGrid.appendChild(userCard);
        });
    }

    function createUserCard(user) {
        const card = document.createElement('div');
        card.className = 'user-card';
        card.setAttribute('data-user-name', user.name.toLowerCase());
        card.setAttribute('data-user-email', user.email.toLowerCase());

        let bookingsHTML = '';
        if (user.bookings && user.bookings.length > 0) {
            bookingsHTML = '<div class="booking-section"><h4>Bookings (' + user.bookings.length + ')</h4><div class="booking-list">';
            user.bookings.forEach(booking => {
                bookingsHTML += `
                    <div class="booking-item">
                        <strong>${booking.type}</strong> - ${booking.carType || booking.bikeType}<br>
                        💰 $${booking.amount} | 📅 ${booking.bookingDate}
                    </div>
                `;
            });
            bookingsHTML += '</div></div>';
        } else {
            bookingsHTML = '<div class="booking-section"><p class="no-bookings">No bookings yet</p></div>';
        }

        card.innerHTML = `
            <div class="user-card-header">
                <h3>${user.name}</h3>
                <div class="user-card-email">${user.email}</div>
            </div>
            <div class="user-details">
                <div><strong>📱 Phone:</strong> ${user.phone || 'N/A'}</div>
                <div><strong>📝 Registered:</strong> ${user.registeredAt}</div>
            </div>
            ${bookingsHTML}
        `;

        return card;
    }

    function calculateStats() {
        const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        let totalBookings = 0;
        let carBookings = 0;
        let bikeBookings = 0;

        users.forEach(user => {
            if (user.bookings && user.bookings.length > 0) {
                totalBookings += user.bookings.length;
                user.bookings.forEach(booking => {
                    if (booking.type === 'Car') carBookings++;
                    if (booking.type === 'Bike') bikeBookings++;
                });
            }
        });

        document.getElementById('totalUsers').textContent = users.length;
        document.getElementById('totalBookings').textContent = totalBookings;
        document.getElementById('carBookings').textContent = carBookings;
        document.getElementById('bikeBookings').textContent = bikeBookings;
    }

    function searchUsers() {
        const searchTerm = document.getElementById('searchBox').value.toLowerCase();
        const userCards = document.querySelectorAll('.user-card');

        userCards.forEach(card => {
            const name = card.getAttribute('data-user-name');
            const email = card.getAttribute('data-user-email');
            
            if (name.includes(searchTerm) || email.includes(searchTerm)) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }

    function logout() {
        localStorage.removeItem('currentUser');
        alert('Logged out successfully.');
        window.location.href = 'index.html';
    }

    window.addEventListener('load', loadAdminDashboard);
</script>

</body>
</html>
