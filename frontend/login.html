<!DOCTYPE html>
<html>

<head>

<title>Login - Veluxe Motors</title>

<link rel="stylesheet" href="../style.css">

<style>
    .role-selection {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
        justify-content: center;
    }

    .role-btn {
        padding: 12px 24px;
        border: 2px solid #d4af37;
        background: white;
        color: #d4af37;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    .role-btn.active {
        background: #d4af37;
        color: white;
    }

    .role-btn:hover {
        background: #d4af37;
        color: white;
    }

    .form-divider {
        text-align: center;
        margin: 20px 0;
        color: #999;
    }

    #adminForm {
        display: none;
    }

    .admin-notice {
        background: #fff3cd;
        border: 1px solid #ffc107;
        color: #856404;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 13px;
    }
</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="cars.html">Cars</a>
<a href="bikes.html">Bikes</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="booking.html">Car Booking</a>
<a href="bike_booking.html">Bike Booking</a>
<a href="login.html">Login</a>
<a href="register.html">Register</a>
</nav>

<section class="form-section">
<div class="form-card">
<h2>Login to Veluxe Motors</h2>

<!-- Role Selection -->
<div class="role-selection">
    <button type="button" class="role-btn active" id="userRoleBtn" onclick="switchRole('user')">User Login</button>
    <button type="button" class="role-btn" id="adminRoleBtn" onclick="switchRole('admin')">Admin Login</button>
</div>

<!-- USER LOGIN FORM -->
<form id="userForm" onsubmit="return handleUserLogin()">
    <label>Email</label>
    <input type="email" id="userEmail" placeholder="you@example.com" required>
    <label>Password</label>
    <input type="password" id="userPassword" placeholder="Enter your password" required>
    <button type="submit">Login</button>
    <p class="small-text">New here? <a href="register.html">Create an account</a></p>
</form>

<!-- ADMIN LOGIN FORM -->
<form id="adminForm" onsubmit="return handleAdminLogin()">
    <div class="admin-notice">
        🔐 Admin access only. Use admin credentials: admin@123
    </div>
    <label>Admin Email</label>
    <input type="email" id="adminEmail" placeholder="admin@example.com" required>
    <label>Admin Password</label>
    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
    <button type="submit">Admin Login</button>
</form>

</div>
</section>

<script>
    function switchRole(role) {
        const userForm = document.getElementById('userForm');
        const adminForm = document.getElementById('adminForm');
        const userRoleBtn = document.getElementById('userRoleBtn');
        const adminRoleBtn = document.getElementById('adminRoleBtn');

        if (role === 'user') {
            userForm.style.display = 'block';
            adminForm.style.display = 'none';
            userRoleBtn.classList.add('active');
            adminRoleBtn.classList.remove('active');
        } else {
            userForm.style.display = 'none';
            adminForm.style.display = 'block';
            userRoleBtn.classList.remove('active');
            adminRoleBtn.classList.add('active');
        }
    }

    function handleUserLogin() {
        const email = document.getElementById('userEmail').value.trim();
        const password = document.getElementById('userPassword').value.trim();

        if (!email || !password) {
            alert('Please enter your email and password.');
            return false;
        }

        // Check if user exists in registered users
        let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        let userExists = users.find(u => u.email === email);

        if (!userExists) {
            alert('User not registered. Please register first.');
            return false;
        }

        // Set current logged-in user (not admin)
        localStorage.setItem('currentUser', JSON.stringify({
            email: email,
            name: userExists.name,
            role: 'user',
            loginTime: new Date().toLocaleString()
        }));

        alert('Login successful. Redirecting to your dashboard.');
        window.location.href = 'user-dashboard.html';
        return false;
    }

    function handleAdminLogin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value.trim();

        // Admin credentials
        const ADMIN_EMAIL = 'admin@123';
        const ADMIN_PASSWORD = 'admin@123';

        if (!email || !password) {
            alert('Please enter admin email and password.');
            return false;
        }

        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            // Set admin user
            localStorage.setItem('currentUser', JSON.stringify({
                email: email,
                name: 'Admin',
                role: 'admin',
                loginTime: new Date().toLocaleString()
            }));

            alert('Admin login successful. Redirecting to admin dashboard.');
            window.location.href = 'admin-dashboard.html';
            return false;
        } else {
            alert('Invalid admin credentials.');
            return false;
        }
    }
</script>

</body>
</html>
